name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Verify build output
        run: pnpm verify-build

      # Each publish step checks the registry first and skips if the current
      # package.json version is already published, so a hotfix that bumps
      # only one package doesn't short-circuit the whole job on "version
      # already exists" from the untouched packages.
      - name: Publish @arcana-ui/tokens
        run: node .github/scripts/publish-if-new.mjs packages/tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @arcana-ui/core
        run: node .github/scripts/publish-if-new.mjs packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @arcana-ui/cli
        run: node .github/scripts/publish-if-new.mjs packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @arcana-ui/mcp
        run: node .github/scripts/publish-if-new.mjs packages/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
